server:
  port: 3000
  host: "0.0.0.0"

database:
  path: "./data/altcron.db"

llm:
  defaultProvider: "ollama"
  fallback: ["ollama", "openrouter", "gemini"]
  
  ollama:
    baseUrl: "http://localhost:11434"
    defaultModel: "qwen2.5:7b"
  
  openrouter:
    baseUrl: "https://openrouter.ai/api/v1"
    defaultModel: "openrouter/free"
  
  gemini:
    model: "gemini-pro"

rag:
  embeddingModel: "nomic-embed-text"
  chunkSize: 1000
  chunkOverlap: 200
  defaultTopK: 5
  minScore: 0.3

skills:
  dir: "./skills"

sessions:
  maxConcurrent: 10
  historyLimit: 100

logging:
  level: "info"
